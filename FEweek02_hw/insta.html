<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>instagram</title>
    <link rel="stylesheet" href="insta.css">
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        body {
            align-items: center;
            justify-content: center;
            width: 800px;
            height: 1000px;
        }
        header {
            width: 100%;
            display: flex;
            align-items: center;
        }
        header .name {
            display: flex;
        }
        header img{
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }
        #myId {
            font-weight: bold;
        }
        #feedImg {
            width: 100%;
            height: 850px;
            display: block;
            object-fit: cover;
        }
        main .inter {
            display: flex;
            gap: 50px;
        }
    </style>
</head>
<body>
    <header>
        <img src="./image/profile.webp" alt="내 프로필">
        <div class="name">
            <p id="myId">dlavenii</p>
            <div class="name-slide">
                <p id="location">스위스</p>
                <p id="bgm">↗ Ariana Grande · twilight zone</p>
            </div>
            <p id="set">···</p>
        </div>
    </header>
    <main>
        <img id="feedImg" src="./image/feed.png" alt="내 피드 사진">
        <div class="inter">
            <p><img src="./image/heart-off.png" alt="좋아요">좋아요 42개</p>
            <img src="./image/sub.png" alt="댓글 등">
            <img id="bm" src="./image/bookmark-off.png" alt="북마크">
        </div>
        <div class="comment">
            <p id="myId">dlavenii</p>
            <p id="mainText">스위스를꼭다시가야하는모임...</p>
            <p>방문한 곳은 인터라켄 융프라우!!</p>
            <p id="date">2월 1일</p>
        </div>
    </main>
    <script src="insta.js"></script>
</body>
</html>
