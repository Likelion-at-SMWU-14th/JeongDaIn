<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>instagram</title>
    <link rel="stylesheet" href="insta.css">
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        body {
            align-items: center;
            justify-content: center;
            width: 800px;
            height: 1000px;
        }
        header {
            width: 95%;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        header .name {
            margin-left: -420px;
            display: flex;
            flex-direction: column;
        }
 
        header img{
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border-style: solid;
        }
        #set{
            font-weight: bold;
        }
        #myId {
            font-weight: bold;
        }

        main {
            width: 100%;
        }
        #feedImg {
            width: 100%;
            height: 850px;
            display: block;
            object-fit: cover;
        }

        footer {
            width: 100%;
            padding: 10px;
        }
        footer .inter {
            display: flex;
            gap: 40px;
            margin-top: 15px;
        }
        footer .inter > img{
            width: 40px;
            height: 40px;
        }
        footer .inter #bm{
            width: 35px;
            margin-left: 430px;
        }
        footer .text #subText{
            display: none;
        }

    </style>
</head>
<body>
    <header>
        <img src="./image/profile.webp" alt="내 프로필">
        <div class="name">
            <p id="myId">dlavenii</p>
            <div class="name-slide">
                <p id="location">스위스</p>
                <p id="bgm">↗ Ariana Grande · twilight zone</p>
            </div>
        </div>
        <p id="set">· · ·</p>
    </header>
    <main>
        <img id="feedImg" src="./image/feed.png" alt="내 피드 사진">
    </main>
    <footer>
        <div class="inter">
            <img id="heart" src="./image/heart-off.png" alt="좋아요">
            <img src="./image/comment.png" alt="댓글">
            <img src="./image/regram.png" alt="리그램">
            <img src="./image/share.png" alt="공유">
            <img id="bm" src="./image/bookmark-off.png" alt="북마크">
        </div>
        <p id="likeCount">좋아요 42개</p>
        <div class="text">
            <p id="myId">dlavenii</p>
            <p id="mainText">스위스를꼭다시가야하는모임...</p>
            <p id="more-btn">더 보기</p>
            <p id="subText">방문한 곳은 인터라켄 융프라우!!</p>
            <p id="hide-btn">접기</p>
            <p id="date">2월 1일</p>
        </div> 
    </footer>
    <script>
        const heart = document.getElementById('heart');
        let isLiked = false;
        let likeNum = 42;

        heart.addEventListener('click', function() {
            if (isLiked) {
                heart.src = './image/heart-off.png'
                likeNum--;
                likeCount.innerHTML = `좋아요 ${likeNum}개`
                isLiked = false;
            } else {
                heart.src = './image/heart-on.png'
                likeNum++;
                likeCount.innerHTML = `좋아요 ${likeNum}개`
                isLiked = true;
            }
        });

        const bookmark = document.getElementById('bm');
        let isbookmarked = false;

        bookmark.addEventListener('click', function() {
            if (isbookmarked) {
                bookmark.src = './image/bookmark-off.png'
                isbookmarked = false;
            } else {
                bookmark.src = './image/bookmark-on.png'
                isbookmarked = true;
            }
        });

    </script>
    <script src="insta.js"></script>
</body>
</html>
