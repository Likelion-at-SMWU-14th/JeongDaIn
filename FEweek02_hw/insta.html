<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>instagram</title>
    <link rel="stylesheet" href="insta.css">
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 800px;
            margin: 0 auto;
        }
        header {
            width: 95%;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }
        header .name {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .name-slide {
            position: relative;
            width: 100%;
            height: 20px;
        }
        #location {
            position: absolute; /* 겹치게 배치 */
            opacity: 1;  /* 처음에는 보이게 */
            transform: translateY(0);
            top: 0;
            font-size: 14px;
            transition: all 0.6s ease-in-out;
        }

        #bgm {
            position: absolute;
            opacity: 0;  /* 처음에는 숨기기 */
            transform: translateY(20px);
            top: 0;
            font-size: 14px;
            transition: all 0.6s ease-in-out;
        }
        header img{
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border-style: solid;
            border-width: 2px;
            border-color: #a4a4a4;
        }
        #set{
            font-weight: bold;
        }
        #myId {
            font-weight: bold;
        }

        main {
            width: 100%;
        }
        #feedImg {
            width: 99%;
            height: 830px;
            display: block;
            object-fit: cover;
        }

        footer {
            width: 100%;
            padding: 10px;
        }
        footer .inter {
            display: flex;
            gap: 40px;
            margin-top: 10px;
        }
        footer .inter > img{
            width: 35px;
            height: 30px;
        }
        footer .inter #bm{
            width: 30px;
            margin-left: 460px;
        }
        #likeCount {
            margin-top: 10px;
            font-weight: 500;
        }
        footer .text {
            margin-top: 5px;
            display: flex;
            gap: 10px;
        }
        footer .text #subText{
            display: none;
        }
        #more-btn {
            cursor: pointer;
            color: #666;
        }
        #hide-btn {
            cursor: pointer;
            color: #666;
            display: none;
        }
        #date {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <header>
        <img src="./image/profile.webp" alt="내 프로필">
        <div class="name">
            <p id="myId">dlavenii</p>
            <div class="name-slide">
                <p id="location">스위스</p>
                <p id="bgm">↗ Ariana Grande · twilight zone</p>
            </div>
        </div>
        <p id="set">· · ·</p>
    </header>
    <main>
        <img id="feedImg" src="./image/feed.png" alt="내 피드 사진">
    </main>
    <footer>
        <div class="inter">
            <img id="heart" src="./image/heart-off.png" alt="좋아요">
            <img src="./image/comment.png" alt="댓글">
            <img src="./image/regram.png" alt="리그램">
            <img src="./image/share.png" alt="공유">
            <img id="bm" src="./image/bookmark-off.png" alt="북마크">
        </div>
        <p id="likeCount">좋아요 42개</p>
        <div class="text">
            <span class="id">
                <p id="myId">dlavenii</p>
            </span>
            <sapn class="myWriting">
                <p id="mainText">스위스를꼭다시가야하는모임...</p>
                <p id="subText">방문한 곳은 인터라켄 융프라우!!</p>
            </sapn>
            <span class="btn">
                <p id="more-btn">더 보기</p>
                <p id="hide-btn"><br>접기</p>
            </span>
        </div>
        <p id="date">2월 1일</p>
    </footer>
    <script>
        // 1. 좋아요 기능
        const heart = document.getElementById('heart');
        let isLiked = false;
        let likeNum = 42;

        heart.addEventListener('click', function() {
            if (isLiked) {
                heart.src = './image/heart-off.png'
                likeNum--;
                likeCount.innerHTML = `좋아요 ${likeNum}개`
                isLiked = false;
            } else {
                heart.src = './image/heart-on.png'
                likeNum++;
                likeCount.innerHTML = `좋아요 ${likeNum}개`
                isLiked = true;
            }
        });

        // 2. 북마크 기능
        const bookmark = document.getElementById('bm');
        let isbookmarked = false;

        bookmark.addEventListener('click', function() {
            if (isbookmarked) {
                bookmark.src = './image/bookmark-off.png'
                isbookmarked = false;
            } else {
                bookmark.src = './image/bookmark-on.png'
                isbookmarked = true;
            }
        });

        // 3. 더보기 기능
        const moreBtn = document.getElementById('more-btn');
        const hideBtn = document.getElementById('hide-btn');
        const subText = document.getElementById('subText');

        moreBtn.addEventListener('click', function() {
            subText.style.display = 'block';
            moreBtn.style.display = 'none';
            hideBtn.style.display = 'inline';
        });

        hideBtn.addEventListener('click', function() {
            subText.style.display = 'none';
            moreBtn.style.display = 'inline';
            hideBtn.style.display = 'none';
        });

        // 4. 추가 - 슬라이드 기능
        const locationEl = document.getElementById('location');
        const bgmEl = document.getElementById('bgm');

        let isLocationShowing = true;

        setInterval(function() {
            if (isLocationShowing) {
                locationEl.style.opacity = '0';
                locationEl.style.transform = 'translateY(-20px)';
                
                bgmEl.style.opacity = '1';
                bgmEl.style.transform = 'translateY(0)';
                
                isLocationShowing = false;
            } else {
                locationEl.style.opacity = '1';
                locationEl.style.transform = 'translateY(0)';
                
                bgmEl.style.opacity = '0';
                bgmEl.style.transform = 'translateY(20px)';
                
                isLocationShowing = true;
            }
        }, 3000);
    </script>
    <script src="insta.js"></script>
</body>
</html>
